<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>New Application</title>
  </head>
  <body style="margin:0; padding:0; background-color:#000000; font-family:Arial, Helvetica, sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 16px;">
      <tr>
        <td align="center">
          
          <!-- Card -->
          <table width="100%" max-width="520px" cellpadding="0" cellspacing="0"
            style="background:#000000; border-radius:12px; border:1px solid #1A1A1A;">
            
            <!-- Logo Header -->
            <tr>
              <td align="center" style="padding:28px 24px 16px;">
                <img 
                  src="https://files.blacvolta.com/uploads/logo.png"
                  alt="BlacVolta"
                  width="50"
                  style="display:block;"
                />
              </td>
            </tr>

            <!-- Job Title Badge -->
            <tr>
              <td align="center" style="padding-bottom:12px;">
                <div style="display:inline-block; padding:6px 14px; border:1px solid #FFFFFF; border-radius:999px; font-size:12px; color:#FFFFFF;">
                  {{jobTitle}}
                </div>
              </td>
            </tr>

            <!-- Divider -->
            <tr>
              <td>
                <div style="height:1px; width:100%; background:#1A1A1A;"></div>
              </td>
            </tr>

            <!-- Content -->
            <tr>
              <td style="padding:28px;">
                
                <!-- Title -->
                <h2 style="margin:0 0 6px; font-size:20px; color:#FFFFFF; text-align:center;">
                  New Application Received
                </h2>
                <p style="margin:0 0 20px; font-size:13px; color:#A1A1AA; text-align:center;">
                  A candidate just applied via your careers page
                </p>

                <!-- Section Divider -->
                <div style="border-top:1px solid #1A1A1A; margin-bottom:20px;"></div>

                <!-- Candidate Info -->
                <p style="margin:12px 0; font-size:14px; color:#FFFFFF;">
                  <strong style="color:#A1A1AA;">Name</strong><br/>
                  {{firstName}} {{lastName}}
                </p>

                <p style="margin:12px 0; font-size:14px;">
                  <strong style="color:#A1A1AA;">Email</strong><br/>
                  <a href="mailto:{{email}}" style="color:#FFFFFF; text-decoration:underline;">
                    {{email}}
                  </a>
                </p>

                <p style="margin:12px 0; font-size:14px; color:#FFFFFF;">
                  <strong style="color:#A1A1AA;">Phone</strong><br/>
                  {{phone}}
                </p>

                <p style="margin:12px 0; font-size:14px;">
                  <strong style="color:#A1A1AA;">LinkedIn</strong><br/>
                  <a href="{{linkedin}}" style="color:#FFFFFF; text-decoration:underline;">
                    View Profile →
                  </a>
                </p>

                <!-- Cover -->
                <div style="margin-top:20px;">
                  <p style="margin:0 0 8px; font-size:14px; color:#FFFFFF;">
                    <strong style="color:#A1A1AA;">Why they’re a great fit</strong>
                  </p>
                  <div style="font-size:14px; line-height:1.6; color:#E4E4E7; background:#0A0A0A; padding:16px; border-radius:10px; border:1px solid #1A1A1A;">
                    {{cover}}
                  </div>
                </div>

              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td style="padding:20px; text-align:center;">
                <p style="font-size:12px; color:#6B7280; margin:0;">
                  BlacVolta Careers • Powered by BlacVolta
                </p>
              </td>
            </tr>

          </table>

        </td>
      </tr>
    </table>
  </body>
</html>
